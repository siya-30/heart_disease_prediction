<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heart Disease Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at top, #0f172a, #020617 70%);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.card {
    width: 950px;
    padding: 45px;
    border-radius: 24px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 80px rgba(34,197,94,0.08);
}

h1 {
    text-align: center;
    margin-bottom: 35px;
    font-weight: 600;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.input-group {
    position: relative;
}

.input-group input,
.input-group select {
    width: 100%;
    padding: 14px 12px;
    border-radius: 12px;
    border: 1px solid transparent;
    background: rgba(255,255,255,0.06);
    color: white;
    outline: none;
    transition: 0.3s;
}

.input-group label {
    position: absolute;
    left: 12px;
    top: 14px;
    font-size: 13px;
    color: #94a3b8;
    pointer-events: none;
    transition: 0.25s;
}

.input-group input:focus + label,
.input-group input:valid + label,
.input-group select:focus + label,
.input-group select:valid + label {
    top: -8px;
    left: 10px;
    font-size: 11px;
    background: #020617;
    padding: 0 6px;
    color: #22c55e;
}

.input-group input:focus,
.input-group select:focus {
    border: 1px solid #22c55e;
    box-shadow: 0 0 12px rgba(34,197,94,0.3);
    background: rgba(255,255,255,0.1);
}

select option {
    color: black;
}

.btn {
    margin-top: 30px;
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #22c55e, #4ade80);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(34,197,94,0.4);
}

.result {
    margin-top: 25px;
    text-align: center;
    font-size: 20px;
}

.high { color: #f87171; }
.low { color: #4ade80; }
</style>
</head>

<body>

<div class="card">
    <h1>💓 Heart Disease Prediction</h1>

    <form action="/predict" method="post">
        <div class="grid">

            <div class="input-group">
                <input type="number" name="age" required>
                <label>Age</label>
            </div>

            <div class="input-group">
                <select name="sex" required>
                    <option value="" disabled selected hidden></option>
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
                <label>Sex</label>
            </div>

            <div class="input-group">
                <select name="cp" required>
                    <option value="" disabled selected hidden></option>
                    <option value="0">Typical Angina</option>
                    <option value="1">Atypical Angina</option>
                    <option value="2">Non-anginal Pain</option>
                    <option value="3">Asymptomatic</option>
                </select>
                <label>Chest Pain Type</label>
            </div>

            <div class="input-group">
                <input type="number" name="trestbps" required>
                <label>Resting BP</label>
            </div>

            <div class="input-group">
                <input type="number" name="chol" required>
                <label>Cholesterol</label>
            </div>

            <div class="input-group">
                <select name="fbs" required>
                    <option value="" disabled selected hidden></option>
                    <option value="1">>120 mg/dl</option>
                    <option value="0">≤120 mg/dl</option>
                </select>
                <label>Fasting Blood Sugar</label>
            </div>

            <div class="input-group">
                <select name="restecg" required>
                    <option value="" disabled selected hidden></option>
                    <option value="0">Normal</option>
                    <option value="1">ST-T abnormality</option>
                    <option value="2">LV Hypertrophy</option>
                </select>
                <label>Rest ECG</label>
            </div>

            <div class="input-group">
                <input type="number" name="thalach" required>
                <label>Max Heart Rate</label>
            </div>

            <div class="input-group">
                <select name="exang" required>
                    <option value="" disabled selected hidden></option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
                <label>Exercise Angina</label>
            </div>

            <div class="input-group">
                <input type="number" step="any" name="oldpeak" required>
                <label>Oldpeak</label>
            </div>

            <div class="input-group">
                <select name="slope" required>
                    <option value="" disabled selected hidden></option>
                    <option value="0">Upsloping</option>
                    <option value="1">Flat</option>
                    <option value="2">Downsloping</option>
                </select>
                <label>Slope</label>
            </div>

            <div class="input-group">
                <select name="ca" required>
                    <option value="" disabled selected hidden></option>
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
                <label>Major Vessels</label>
            </div>

            <div class="input-group">
                <select name="thal" required>
                    <option value="" disabled selected hidden></option>
                    <option value="1">Normal</option>
                    <option value="2">Fixed Defect</option>
                    <option value="3">Reversible Defect</option>
                </select>
                <label>Thal</label>
            </div>

        </div>

        <button class="btn">Predict</button>
    </form>

    {% if prediction_text %}
    <div class="result 
        {% if 'High' in prediction_text %}high{% else %}low{% endif %}">
        {{ prediction_text }}
    </div>
    {% endif %}
</div>

</body>
</html>
